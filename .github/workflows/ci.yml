name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      # RC-132: ruff lint
      - name: Ruff lint
        run: uv run ruff check .

      # RC-132: mypy type-check
      - name: Mypy type-check
        run: uv run mypy app --ignore-missing-imports --no-strict-optional

      # RC-132: pytest unit tests with coverage gate
      - name: Pytest unit tests with coverage
        run: |
          uv run pytest tests/unit \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=85 \
            -v

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  # RC-133: frontend type-check and build
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

      - name: Build
        run: npm run build

  # RC-134: publish coverage as PR comment
  coverage-comment:
    name: Publish Coverage Comment
    runs-on: ubuntu-latest
    needs: backend
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Post coverage comment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: ./coverage.xml
          title: "Backend Test Coverage"
          badge-title: "Coverage"
          hide-comment: false
          create-new-comment: false
          hide-report: false
          report-only-changed-files: false
